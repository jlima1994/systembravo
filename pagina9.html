<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumo</title>

  <style>
    body{
      font-family: Arial;
      padding:20px;
      max-width:600px;
      margin:auto;
    }

    h2{
      text-align:center;
    }

    pre{
      background:#f4f4f4;
      padding:15px;
      white-space:pre-wrap;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:20px;
      font-size:18px;
      background:#28a745;
      color:white;
      border:none;
      border-radius:5px;
    }
  </style>
</head>

<body>

<h2>Resumo do Serviço</h2>

<pre id="resumo"></pre>

<button onclick="irRelatorio()">Gerar Relatório</button>

<script src="app.js?v=9"></script>

<script>
<script>
function carregarResumo(){

  const data = (localStorage.getItem("data") || "").toUpperCase();

  const tipo = (localStorage.getItem("tipoServico") || "").toUpperCase();
  const descricao = (localStorage.getItem("descricao") || "").toUpperCase();

  const placa = (localStorage.getItem("placa") || "").toUpperCase();
  const motorista = (localStorage.getItem("motorista") || "").toUpperCase();
  const seguranca = (localStorage.getItem("seguranca") || "").toUpperCase();

  const km4 = localStorage.getItem("kmInicialDeslocamento") || 0;
  const hora4 = (localStorage.getItem("horaInicialDeslocamento") || "").toUpperCase();

  const km5 = localStorage.getItem("kmInicialServico") || 0;
  const hora5 = (localStorage.getItem("horaInicialServico") || "").toUpperCase();

  const km6 = localStorage.getItem("kmFinalServico") || 0;
  const hora6 = (localStorage.getItem("horaFinalServico") || "").toUpperCase();

  const km7 = localStorage.getItem("kmFinalDeslocamento") || 0;
  const hora7 = (localStorage.getItem("horaFinalDeslocamento") || "").toUpperCase();

  const pedagios = JSON.parse(localStorage.getItem("pedagios") || "[]");

  const kmTotal = km7 - km4;

  let texto = `
DATA: ${data}

${tipo} - ${descricao}

EQUIPE:
VEÍCULO: ${placa}
MOT: ${motorista}
SEG: ${seguranca}

DESLOCAMENTO: ${km4} (${hora4})
INICIO ${tipo}: ${km5} (${hora5})
FINAL ${tipo}: ${km6} (${hora6})
DESLOCAMENTO: ${km7} (${hora7})

DESLOCAMENTO TOTAL: ${kmTotal} KM

PEDÁGIOS:
`;

  if(pedagios.length === 0){
    texto += "NENHUM\n";
  } else {
    pedagios.forEach(p => {
      texto += `QTD: ${p.quantidade} | VALOR: R$ ${p.valor}\n`;
    });
  }

  document.getElementById("resumo").textContent = texto;
}

function irRelatorio(){
  location.href = "pagina10.html";
}

carregarResumo();
</script>

</body>
</html>
