<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumo</title>

  <style>
    body{
      font-family: Arial;
      padding:20px;
      max-width:600px;
      margin:auto;
    }

    h2{
      text-align:center;
    }

    pre{
      background:#f4f4f4;
      padding:15px;
      white-space:pre-wrap;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:20px;
      font-size:18px;
      background:#28a745;
      color:white;
      border:none;
      border-radius:5px;
    }
  </style>
</head>

<body>

<h2>Resumo do Serviço</h2>

<pre id="resumo"></pre>

<button onclick="irRelatorio()">Gerar Relatório</button>

<script src="app.js?v=9"></script>

<script>
<script>
function carregarResumo(){

  const data = (localStorage.getItem("data") || "").toUpperCase();
  const tipo = (localStorage.getItem("tipoServico") || "").toUpperCase();
  const descricao = (localStorage.getItem("descricao") || "").toUpperCase();

  const placa = (localStorage.getItem("placa") || "").toUpperCase();
  const motorista = (localStorage.getItem("motorista") || "").toUpperCase();
  const seguranca = (localStorage.getItem("seguranca") || "").toUpperCase();

  const kmIniDesloc = localStorage.getItem("kmInicialDeslocamento") || "0";
  const horaIniDesloc = localStorage.getItem("horaInicialDeslocamento") || "";

  const kmIniServ = localStorage.getItem("kmInicialServico") || "0";
  const horaIniServ = localStorage.getItem("horaInicialServico") || "";

  const kmFimServ = localStorage.getItem("kmFinalServico") || "0";
  const horaFimServ = localStorage.getItem("horaFinalServico") || "";

  const kmFimDesloc = localStorage.getItem("kmFinalDeslocamento") || "0";
  const horaFimDesloc = localStorage.getItem("horaFinalDeslocamento") || "";

  const totalKm = kmFimDesloc - kmIniDesloc;

  let texto = `
${data}
${tipo} - ${descricao}

EQUIPE:
VEÍCULO: ${placa}
MOT: ${motorista}
SEG: ${seguranca}

DESLOCAMENTO: ${kmIniDesloc} ${horaIniDesloc}
INICIO ${tipo}: ${kmIniServ} ${horaIniServ}
FINAL ${tipo}: ${kmFimServ} ${horaFimServ}
DESLOCAMENTO: ${kmFimDesloc} ${horaFimDesloc}

DESLOCAMENTO TOTAL: ${totalKm} KM
`;

  document.getElementById("resumo").textContent = texto;
}

carregarResumo();
</script>
</body>
</html>
