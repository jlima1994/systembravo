<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h3>Pedágios</h3>

<div id="pedagios"></div>

<button onclick="salvarPagina8()">Próximo</button>

<script>
let html = "";
for(let i=0;i<10;i++){
  html += `
    <div style="display:flex; gap:5px; margin-bottom:5px;">
      <select id="qtd${i}">
        ${[...Array(21).keys()].map(n=>`<option value="${n}">${n}</option>`).join("")}
      </select>
      <input type="number" id="valor${i}" placeholder="Valor até 100">
    </div>
  `;
}
document.getElementById("pedagios").innerHTML = html;
</script>

<script src="app.js"></script>
</body>
</html>
