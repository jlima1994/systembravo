<script>
let registros = JSON.parse(localStorage.getItem("registros")) || [];

document.write("<table border=1>");
document.write("<tr><th>Data</th><th>Tipo</th><th>KM</th></tr>");

registros.forEach(r=>{
  document.write(`<tr>
    <td>${r.data}</td>
    <td>${r.tipo}</td>
    <td>${r.kmInicialDesloc}</td>
  </tr>`);
});

document.write("</table>");
</script>
